<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Battle P2P</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="menu">
        <h1 class="glow">SKY BATTLE</h1>
        
        <input type="text" id="username" placeholder="PILOT NAME" maxlength="10">
        <br><br>

        <button onclick="hostGame()">HOST MATCH</button>
        <div class="divider"></div>
        <input type="text" id="joinCode" maxlength="4" placeholder="ENTER 4-DIGIT CODE">
        <br>
        <button onclick="joinGame()">JOIN MATCH</button>
        <p id="statusMsg">Ready to deploy</p>
    </div>

    <div id="hud">
        <div id="connectionStatus">Status: Offline</div>
        <div class="controls-hint">
            WASD: Fly | SHIFT: Boost | SPACE: Shoot | M: Missile
        </div>
        <div id="healthBarBox">
            <div id="healthBar"></div>
        </div>
        <div id="speedGauge">THRUST: 0%</div>
    </div>

    <div id="killFeed"></div>
    
    <div id="notification"></div>

    <div id="touchControls">
        <div id="stickLeft">
            <div class="touch-row">
                <button class="t-btn" id="btnW">▲</button>
            </div>
            <div class="touch-row">
                <button class="t-btn" id="btnA">◀</button>
                <button class="t-btn" id="btnS">▼</button>
                <button class="t-btn" id="btnD">▶</button>
            </div>
        </div>

        <div id="stickRight">
            <button class="t-btn round big" id="btnSpace">🔥</button>
            <div class="sub-actions">
                <button class="t-btn round" id="btnShift">💨</button>
                <button class="t-btn round" id="btnM">🚀</button>
                <button class="t-btn round" id="btnL" style="display:none; border-color:cyan; color:cyan;">⚡</button>
            </div>
        </div>
    </div>

    <div id="settingsCog" onclick="toggleAdminPanel()">⚙️</div>

    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>ADMIN CONTROL</h3>
            <button onclick="toggleAdminPanel()" style="padding:2px 8px; font-size:12px; margin:0; background:red;">X</button>
        </div>

        <div id="loginSection">
            <input type="password" id="adminPass" placeholder="ENTER PIN (8007)">
            <button onclick="unlockAdmin()" class="cheat-btn">ACCESS</button>
        </div>
        <div id="cheatSection">
            <div class="cheat-row"><button id="btnLaser" onclick="toggleCheat('laser')" class="cheat-btn">UNLOCK LASER (L)</button></div>
            <div class="cheat-row"><button id="btnGod" onclick="toggleCheat('god')" class="cheat-btn">GOD MODE</button></div>
            <div class="cheat-row"><button id="btnSpeed" onclick="toggleCheat('speed')" class="cheat-btn">SUPER SPEED</button></div>
            <div class="cheat-row"><button id="btnRapid" onclick="toggleCheat('rapid')" class="cheat-btn">RAPID FIRE</button></div>
            <div class="cheat-row"><button id="btnNuke" onclick="toggleCheat('nuke')" class="cheat-btn" style="border-color: red; color: red;">☢️ NUKE ALL ☢️</button></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
